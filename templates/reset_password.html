<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Tunefry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    .error {
      background: #3b0000;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.4rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 0.95rem;
      margin-bottom: 1.2rem;
    }
    input[type="password"]:focus { outline: 2px solid #6366f1; border-color: transparent; }
    button {
      width: 100%;
      padding: 0.7rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    .success { text-align: center; color: #a3e635; }
    .back { display: block; text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #6366f1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set new password</h1>

    {% if error %}
      <div class="error">{{ error }}</div>
      <a class="back" href="{{ request.app.state.frontend_url | default('/') }}">← Back to Tunefry</a>
    {% elif not valid %}
      <div class="error">This reset link is invalid or has expired. Please request a new one.</div>
      <a class="back" href="{{ request.app.state.frontend_url | default('/') }}">← Back to Tunefry</a>
    {% else %}
      <form id="resetForm">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" minlength="8" required placeholder="At least 8 characters" />

        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" required placeholder="Repeat password" />

        <div id="formError" class="error" style="display:none;"></div>
        <button type="submit" id="submitBtn">Update password</button>
      </form>

      <div id="successMsg" class="success" style="display:none;">
        Password updated! <a class="back" href="{{ request.app.state.frontend_url | default('/') }}">Log in →</a>
      </div>

      <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const pw = document.getElementById('password').value;
          const confirm = document.getElementById('confirm').value;
          const errEl = document.getElementById('formError');
          errEl.style.display = 'none';

          if (pw !== confirm) {
            errEl.textContent = 'Passwords do not match.';
            errEl.style.display = 'block';
            return;
          }

          document.getElementById('submitBtn').disabled = true;

          const res = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw }),
            credentials: 'include',
          });

          if (res.ok) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
          } else {
            const data = await res.json().catch(() => ({}));
            errEl.textContent = data.detail || 'Something went wrong. Please try again.';
            errEl.style.display = 'block';
            document.getElementById('submitBtn').disabled = false;
          }
        });
      </script>
    {% endif %}
  </div>
</body>
</html>
