services:
  - type: web
    name: tunefry-backend
    runtime: docker
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: OAUTH_CALLBACK_BASE_URL
        sync: false
      - key: GOOGLE_OAUTH_ENABLED
        value: "false"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: PAYMENT_AMOUNT_DIVISOR
        sync: false
